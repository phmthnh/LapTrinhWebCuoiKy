<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - SmartHome</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="login-page-body">

  <header class="login-page-header">
    <div class="login-header-container">
      <div class="logo">
        <a href="#home">
          <span>SmartHome</span>
        </a>
      </div>
      <span class="header-page-title">Đăng nhập</span>
    </div>
  </header>

  <main class="login-main-content">
    <div class="login-wrapper">
      
      <div class="shopee-login-card">
        <h2 class="form-title">Đăng nhập</h2>
        
        <form action="#">
          <div class="shopee-input-group">
            <input type="text" placeholder="Email/Số điện thoại/Tên đăng nhập" required />
          </div>
          
          <div class="shopee-input-group">
            <input type="password" placeholder="Mật khẩu" required />
          </div>

          <button type="submit" class="shopee-btn-submit">ĐĂNG NHẬP</button>

          <div class="shopee-form-links">
            <a href="#" class="link-item">Quên mật khẩu</a>
            <a href="#" class="link-item highlight">Đăng ký tài khoản</a>
          </div>

          <div class="shopee-divider">
            <div class="line"></div>
            <span>HOẶC</span>
            <div class="line"></div>
          </div>

          <div class="shopee-social-login">
            <button type="button" class="btn-social fb"><i class="fa-brands fa-facebook"></i> Facebook</button>
            <button type="button" class="btn-social gg"><i class="fa-brands fa-google"></i> Google</button>
          </div>
        </form>
      </div>

    </div>
  </main>

</body>
</html>
